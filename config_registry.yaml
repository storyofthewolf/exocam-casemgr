  cam_land_fv:
    "1bar":
      40: control_L40_dry.cam.i.nc
      51: ic_1bar_L51_zmean_dry_ic.nc
    "4bar":
      51: ic_4bar_L51_eyeball_dry_ic.nc
    "10bar":
      51: ic_10bar_L51_zmean_dry_ic.nc

  cam_mixed_fv:
    # mixed config uses cam_aqua_fv ICs for atmosphere; add here if different
    "1bar":
      51: control_L51.cam.i.nc

  cam_aqua_se_ne5:
    "1bar":
      30: cami_0000-01-01_ne5np4_L30_ape_c101201_aquaplanet.nc

  cam_aqua_se_ne16:
    "1bar":
      26: cami_0000-01-01_ne16np4_L26_c120525_aquaplanet.nc
